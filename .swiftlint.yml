# Minimal SwiftLint bootstrap for future SwiftPM-style source roots.
included:
  - Sources
  - Tests
  - Scripts

# Keep tooling, docs, and build artifacts out of repo-root scans.
excluded:
  - .build
  - .codex
  - .git
  - docs

allow_zero_lintable_files: true

opt_in_rules:
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_count
  - force_unwrapping
